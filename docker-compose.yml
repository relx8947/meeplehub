services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meeplehub-backend
    environment:
      NODE_ENV: production
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ROOM_INACTIVE_TIMEOUT_MS: ${ROOM_INACTIVE_TIMEOUT_MS:-600000}
      ROOM_CLEANUP_INTERVAL_MS: ${ROOM_CLEANUP_INTERVAL_MS:-30000}
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001/play}
    container_name: meeplehub-frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      INTERNAL_API_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001/play}
    ports:
      - "3000:3000"
    depends_on:
      - backend
